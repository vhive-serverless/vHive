# golangci-lint configuration
# See https://golangci-lint.run/usage/configuration/

version: "2"

linters:
  default: standard

  settings:
    staticcheck:
      checks: 
        - "all"
        - "-ST1005" # Disable: error strings should not be capitalized
        - "-QF1011" # Disable: could omit type from declaration (redundant type)
        - "-ST1023" # Disable: omit type from declaration (redundant type)
        - "-SA1019" # Disable: using deprecated function
        - "-ST1003" # Disable: Naming of specific names to be in capslock

  exclusions:
    presets:
      - common-false-positives
      - legacy # Simutate v1 golangci-lint behavior
      - std-error-handling

formatters:
  enable:
    - gofmt