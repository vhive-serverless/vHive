apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: helloworldserial
  namespace: default
spec:
  template:
    spec:
      runtimeClassName: gvisor
      containerConcurrency: 1
      containers:
        - image: ghcr.io/ease-lab/helloworld:var_workload
          ports:
            - name: h2c # For GRPC support
              containerPort: 50051
