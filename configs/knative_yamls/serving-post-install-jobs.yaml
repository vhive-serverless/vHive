apiVersion: batch/v1
kind: Job
metadata:
  generateName: cleanup-serving-
  namespace: knative-serving
  labels:
    app: cleanup-serving
    app.kubernetes.io/name: knative-serving
    app.kubernetes.io/component: cleanup-job
    app.kubernetes.io/version: devel
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: cleanup-migration-serving
        app.kubernetes.io/name: knative-serving
        app.kubernetes.io/component: cleanup-job
        app.kubernetes.io/version: devel
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: controller
      restartPolicy: OnFailure
      containers:
        - name: cleanup
          # This is the Go import path for the binary that is containerized

          # and substituted here.
          image: docker.io/zj3214/cleanup-f5c13b21c1dd1ddc70fa555ce0b49ebc@sha256:e457912c4e4aa86dbeddf71c2d4e7a39b3600c9ec85ba4214e35a667d202764d
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
            limits:
              cpu: 1000m
              memory: 1000Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: SYSTEM_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

