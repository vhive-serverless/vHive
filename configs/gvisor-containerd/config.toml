version = 2
root = "/var/lib/gvisor-containerd/containerd"
state = "/run/gvisor-containerd"
[grpc]
  address = "/run/gvisor-containerd/containerd.sock"
[plugins."io.containerd.runtime.v1.linux"]
  shim_debug = true
[plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runsc]
  runtime_type = "io.containerd.runsc.v1"
  [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runsc.options]
    # Use host networking to avoid veth creation that requires CAP_NET_ADMIN
    # This allows gVisor to work on GitHub runners with restricted permissions
    TypeUrl = "io.containerd.runsc.v1.options"
    ConfigPath = "/etc/gvisor-containerd/runsc.toml"

[debug]
  level = "debug"

