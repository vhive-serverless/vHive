name: vHive CRI tests

on:
  workflow_call:
    inputs:
      sandbox:
        required: true
        type: string

env:
  GO111MODULE: on

jobs:
  cri-tests:
    name: CRI tests
    env:
      GITHUB_RUN_ID: ${{ github.run_id }}
      GITHUB_VHIVE_ARGS: "-dbg"
    runs-on: ubuntu-24.04

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet \
                      /opt/ghc \
                      /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY" \
                      /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          docker system prune -af --volumes

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go version in go.mod file
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ github.workspace }}/go.mod
          cache-dependency-path: |
            **/go.sum
            **/go.mod

      - name: Add rsync
        run: |
          sudo apt update
          sudo apt install rsync -y

      - name: Build setup scripts
        run: pushd scripts && go build -o setup_tool && popd

      - name: Setup Node
        run: ./scripts/setup_tool setup_node ${{ inputs.sandbox }}

      - name: Setup Kubernetes cluster
        run: |
          # Start vHive cluster (creates Kubernetes + Knative)
          ./scripts/setup_tool -vhive-repo-dir ${{ github.workspace }} start_onenode_vhive_cluster ${{ inputs.sandbox }}
          sleep 30s
          
          # Setup Zipkin
          ./scripts/setup_tool -vhive-repo-dir ${{ github.workspace }} setup_zipkin

      - name: Test DNS BEFORE fix (expect failures)
        continue-on-error: true
        run: |
          echo "=== Testing DNS resolution BEFORE CoreDNS fix ==="
          
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl run dns-test-before \
            --image=busybox:1.36 \
            --restart=Never \
            --command -- sleep 300
          
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl wait --for=condition=Ready pod/dns-test-before --timeout=60s || true
          
          echo "Testing external DNS resolution..."
          FAIL_COUNT=0
          for registry in ghcr.io docker.io gcr.io; do
            if sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl exec dns-test-before -- nslookup $registry > /dev/null 2>&1; then
              echo "✓ $registry: Can resolve"
            else
              echo "✗ $registry: Cannot resolve"
              FAIL_COUNT=$((FAIL_COUNT+1))
            fi
          done
          
          if [ $FAIL_COUNT -eq 0 ]; then
            echo ""
            echo "✓ DNS already works - GitHub runners have proper DNS configuration"
            echo "  CoreDNS fix may not be needed, but we'll apply it for consistency"
          else
            echo ""
            echo "✗ DNS broken - CoreDNS cannot resolve external domains"
            echo "  CoreDNS fix is required"
          fi
          
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl delete pod dns-test-before --wait=false || true

      - name: Apply CoreDNS fix
        run: |
          echo "=== Checking current CoreDNS configuration ==="
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl get configmap coredns -n kube-system -o yaml | grep -A5 "forward"
          
          echo ""
          echo "=== Applying CoreDNS fix ==="
          
          # Use Google DNS as it's guaranteed to be reachable
          HOST_DNS="8.8.8.8"
          echo "Using Google DNS: $HOST_DNS"
          
          # Backup original config
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl get configmap coredns -n kube-system -o yaml > /tmp/coredns-original.yaml
          
          # Patch CoreDNS ConfigMap
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl get configmap coredns -n kube-system -o json | \
            jq --arg dns "$HOST_DNS" '.data.Corefile |= gsub("forward . /etc/resolv.conf"; "forward . " + $dns)' | \
            sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl apply -f -
          
          echo ""
          echo "=== Verifying CoreDNS configuration after patch ==="
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl get configmap coredns -n kube-system -o yaml | grep -A5 "forward"
          
          # Restart CoreDNS
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl rollout restart deployment/coredns -n kube-system
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl rollout status deployment/coredns -n kube-system --timeout=60s
          
          echo "Waiting for DNS changes to propagate..."
          sleep 15

      - name: Test DNS AFTER fix (must succeed)
        run: |
          echo "=== Testing DNS resolution AFTER CoreDNS fix ==="
          
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl run dns-test-after \
            --image=busybox:1.36 \
            --restart=Never \
            --command -- sleep 300
          
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl wait --for=condition=Ready pod/dns-test-after --timeout=60s
          
          echo ""
          echo "=== Pod DNS Configuration ==="
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl exec dns-test-after -- cat /etc/resolv.conf
          
          echo ""
          echo "=== Testing Direct IP Connectivity ==="
          echo "Can pod reach Google DNS directly?"
          if sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl exec dns-test-after -- ping -c 2 8.8.8.8 2>&1 | grep -q "2 packets transmitted"; then
            echo "✓ Can ping 8.8.8.8"
          else
            echo "✗ Cannot ping 8.8.8.8 - network connectivity issue!"
            sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl exec dns-test-after -- ping -c 2 8.8.8.8 || true
          fi
          
          echo ""
          echo "=== Testing DNS Resolution Through CoreDNS ==="
          PASS=0
          FAIL=0
          
          for registry in ghcr.io docker.io gcr.io; do
            if sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl exec dns-test-after -- nslookup $registry > /dev/null 2>&1; then
              echo "✓ $registry: SUCCESS"
              PASS=$((PASS+1))
            else
              echo "✗ $registry: FAILED"
              FAIL=$((FAIL+1))
            fi
          done
          
          echo ""
          echo "=== CoreDNS Pod Logs (last 20 lines) ==="
          COREDNS_POD=$(sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl get pods -n kube-system -l k8s-app=kube-dns -o name | head -1)
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl logs -n kube-system $COREDNS_POD --tail=20 || true
          
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl delete pod dns-test-after --wait=false
          
          echo ""
          echo "Results: $PASS passed, $FAIL failed"
          
          if [ $FAIL -gt 0 ]; then
            echo ""
            echo "ERROR: DNS resolution still failing after fix!"
            echo "This indicates a network policy or connectivity issue preventing pods from reaching external DNS servers."
            exit 1
          fi

      - name: Deploy Knative services
        run: |
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kn service apply helloworld -f configs/knative_workloads/${{ inputs.sandbox }}/helloworld.yaml
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kn service apply helloworldserial -f configs/knative_workloads/${{ inputs.sandbox }}/helloworldSerial.yaml
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kn service apply pyaes -f configs/knative_workloads/${{ inputs.sandbox }}/pyaes.yaml
          sleep 30s
      
      - name: Run vHive CRI tests
        run: source /etc/profile && go clean -testcache && go test ./cri -v -race -cover

      - name: Run sandbox specific tests
        if: ${{ inputs.sandbox == 'firecracker' }}
        run: source /etc/profile && go clean -testcache && go test ./cri/${{ inputs.sandbox }} -v -race -cover

      - name: Archive log artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: ctrd-logs
          path: |
            /tmp/ctrd-logs/
            ${{ github.workspace }}/*.log
            ${{ github.workspace }}/scripts/github_runner/*.log