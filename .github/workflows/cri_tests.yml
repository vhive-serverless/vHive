name: vHive CRI tests

on:
  workflow_call:
    inputs:
      sandbox:
        required: true
        type: string

env:
  GO111MODULE: on

jobs:
  cri-tests:
    name: CRI tests
    env:
      GITHUB_RUN_ID: ${{ github.run_id }}
      GITHUB_VHIVE_ARGS: "-dbg"
    runs-on: ubuntu-24.04

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet \
                      /opt/ghc \
                      /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY" \
                      /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          docker system prune -af --volumes

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go version in go.mod file
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ github.workspace }}/go.mod
          cache-dependency-path: |
            **/go.sum
            **/go.mod

      - name: Add rsync
        run: |
          sudo apt update
          sudo apt install rsync -y

      - name: Build setup scripts
        run: pushd scripts && go build -o setup_tool && popd

      - name: Setup Node
        run: ./scripts/setup_tool setup_node ${{ inputs.sandbox }}

      - name: Set runsc capabilities for network operations
        run: |
          echo "=== Checking runsc binary before capability setup ==="
          ls -la /usr/local/bin/runsc
          echo ""
          echo "Current capabilities (should be empty):"
          getcap /usr/local/bin/runsc || echo "No capabilities set"
          
          echo ""
          echo "=== Setting CAP_NET_ADMIN capability on runsc for veth interface creation ==="
          sudo setcap cap_net_admin,cap_net_raw+ep /usr/local/bin/runsc
          
          echo ""
          echo "=== Verifying capabilities were applied ==="
          getcap /usr/local/bin/runsc
          
          echo ""
          echo "=== Testing runsc with new capabilities ==="
          /usr/local/bin/runsc do echo "capability test" 2>&1 && echo "✓ runsc can create network interfaces" || echo "✗ runsc still cannot create network interfaces"

      - name: Setup Kubernetes cluster
        run: |
          # Start vHive cluster (creates Kubernetes + Knative)
          ./scripts/setup_tool -vhive-repo-dir ${{ github.workspace }} start_onenode_vhive_cluster ${{ inputs.sandbox }}
          sleep 30s
          
          echo "=== Verifying gvisor-containerd daemon started ==="
          ps aux | grep gvisor-containerd | grep -v grep || echo "WARNING: gvisor-containerd not running"
          
          # Check socket
          if [ -S /run/gvisor-containerd/gvisor-containerd.sock ]; then
            echo "✓ gvisor-containerd socket exists"
            ls -la /run/gvisor-containerd/gvisor-containerd.sock
          else
            echo "✗ gvisor-containerd socket NOT found"
            ls -la /run/gvisor-containerd/ 2>/dev/null || echo "Directory doesn't exist"
          fi
          
          # Check logs in correct location
          echo ""
          echo "=== Checking gvisor-containerd logs in /tmp/ctrd-logs/${{ github.run_id }}/ ==="
          LOG_DIR="/tmp/ctrd-logs/${{ github.run_id }}"
          if [ -d "$LOG_DIR" ]; then
            echo "Log directory exists:"
            ls -la "$LOG_DIR"
            echo ""
            if [ -f "$LOG_DIR/gvisor.out" ]; then
              echo "--- gvisor.out ---"
              cat "$LOG_DIR/gvisor.out"
            else
              echo "gvisor.out not found"
            fi
            if [ -f "$LOG_DIR/gvisor.err" ]; then
              echo "--- gvisor.err ---"
              cat "$LOG_DIR/gvisor.err"
            else
              echo "gvisor.err not found"
            fi
          else
            echo "Log directory $LOG_DIR does not exist"
          fi
          
          # Check if binary exists and is executable
          echo ""
          echo "=== Checking gvisor-containerd binary ==="
          ls -la /usr/local/bin/gvisor-containerd
          file /usr/local/bin/gvisor-containerd
          /usr/local/bin/gvisor-containerd --version 2>&1 || echo "Failed to get version"
          
          # Check config file
          echo ""
          echo "=== Checking gvisor-containerd config ==="
          if [ -f /etc/gvisor-containerd/config.toml ]; then
            cat /etc/gvisor-containerd/config.toml
          else
            echo "Config file not found"
          fi
          
          echo ""
          echo "=== Checking stock containerd config for gVisor runtime ==="
          echo "Stock containerd needs to be configured to use gVisor for pods..."
          if grep -A5 "runsc" /etc/containerd/config.toml; then
            echo "✓ runsc runtime found in stock containerd config"
          else
            echo "✗ runsc runtime NOT found in stock containerd config"
            echo "This means Kubernetes pods will use runc instead of runsc!"
          fi
          
          echo ""
          echo "=== Checking for Kubernetes RuntimeClass ==="
          kubectl get runtimeclass -A || echo "No RuntimeClass defined"
          
          echo ""
          echo "=== Checking vHive CRI socket ==="
          if [ -S /etc/vhive-cri/vhive-cri.sock ]; then
            echo "✓ vhive-cri.sock exists"
            ls -la /etc/vhive-cri/vhive-cri.sock
          else
            echo "✗ vhive-cri.sock NOT found"
            ls -la /etc/vhive-cri/ || echo "Directory doesn't exist"
          fi
          
          echo ""
          echo "=== Checking what CRI socket kubelet is using ==="
          ps aux | grep kubelet | grep -o 'container-runtime-endpoint=[^ ]*' || echo "No container-runtime-endpoint found"
          sudo systemctl cat kubelet | grep -i "container-runtime" || echo "No runtime config in kubelet service"
          
          echo ""
          echo "=== Checking vHive orchestrator status ==="
          ps aux | grep "./vhive" | grep -v grep || echo "vHive orchestrator not running"
          if [ -f /tmp/ctrd-logs/${{ github.run_id }}/orch.out ]; then
            echo "--- Last 20 lines of orch.out ---"
            tail -20 /tmp/ctrd-logs/${{ github.run_id }}/orch.out
          fi
          if [ -f /tmp/ctrd-logs/${{ github.run_id }}/orch.err ]; then
            echo "--- orch.err ---"
            cat /tmp/ctrd-logs/${{ github.run_id }}/orch.err
          fi
          
          # Setup Zipkin
          ./scripts/setup_tool -vhive-repo-dir ${{ github.workspace }} setup_zipkin

      - name: Pre-pull images on host
        run: |
          echo "=== Pre-pulling container images on host ==="
          echo "GitHub runners block port 53 egress from pods, so we must pull images on the host first."
          
          # Pull all unique images that Knative services will need
          # Note: helloworldSerial also uses helloworld:var_workload
          sudo ctr -n k8s.io images pull ghcr.io/ease-lab/helloworld:var_workload
          sudo ctr -n k8s.io images pull ghcr.io/ease-lab/pyaes:var_workload
          
          echo ""
          echo "=== Verifying images are available in k8s.io namespace ==="
          sudo ctr -n k8s.io images ls | grep ghcr.io/ease-lab
          
          echo ""
          echo "=== Verifying Kubernetes can see these images ==="
          # Use crictl to check images from Kubernetes perspective
          sudo crictl images | grep ghcr.io/ease-lab || echo "Note: crictl not showing images yet, but they're in containerd"
          
          echo ""
          echo "=== Checking gVisor runtime status ==="
          echo "Checking if gvisor-containerd is running..."
          sudo systemctl status gvisor-containerd --no-pager || echo "gvisor-containerd service not found or not running"
          
          echo ""
          echo "Checking containerd runtime configuration..."
          sudo ctr -n k8s.io plugin ls | grep runsc || echo "runsc plugin not found"
          
          echo ""
          echo "Checking runsc binary..."
          which runsc && runsc --version || echo "runsc binary not found"

      - name: Patch Knative configs for local images
        run: |
          echo "=== Getting image digests from pre-pulled images ==="
          # Knative admission webhook resolves images to digests, which requires DNS
          # Instead, we'll use the digest of the pre-pulled images directly
          
          HELLOWORLD_DIGEST=$(sudo ctr -n k8s.io images ls | grep "ghcr.io/ease-lab/helloworld:var_workload" | awk '{print $3}' | sed 's/sha256://')
          PYAES_DIGEST=$(sudo ctr -n k8s.io images ls | grep "ghcr.io/ease-lab/pyaes:var_workload" | awk '{print $3}' | sed 's/sha256://')
          
          echo "Helloworld digest: $HELLOWORLD_DIGEST"
          echo "Pyaes digest: $PYAES_DIGEST"
          
          if [ -z "$HELLOWORLD_DIGEST" ] || [ -z "$PYAES_DIGEST" ]; then
            echo "ERROR: Failed to get image digests"
            sudo ctr -n k8s.io images ls | grep ghcr.io/ease-lab
            exit 1
          fi
          
          echo ""
          echo "=== Replacing image tags with digests in Knative configs ==="
          # Replace image references with digest-based references
          
          for config in configs/knative_workloads/${{ inputs.sandbox }}/helloworld.yaml \
                        configs/knative_workloads/${{ inputs.sandbox }}/helloworldSerial.yaml; do
            if [ -f "$config" ]; then
              echo "Patching $config with digest"
              sed -i "s|ghcr.io/ease-lab/helloworld:var_workload|ghcr.io/ease-lab/helloworld@sha256:$HELLOWORLD_DIGEST|g" "$config"
            fi
          done
          
          if [ -f configs/knative_workloads/${{ inputs.sandbox }}/pyaes.yaml ]; then
            echo "Patching pyaes.yaml with digest"
            sed -i "s|ghcr.io/ease-lab/pyaes:var_workload|ghcr.io/ease-lab/pyaes@sha256:$PYAES_DIGEST|g" \
              configs/knative_workloads/${{ inputs.sandbox }}/pyaes.yaml
          fi
          
          echo ""
          echo "=== Verifying patches ==="
          grep "image:" configs/knative_workloads/${{ inputs.sandbox }}/*.yaml

      - name: Deploy Knative services
        run: |
          echo "=== Applying helloworld service ==="
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kn service apply helloworld -f configs/knative_workloads/${{ inputs.sandbox }}/helloworld.yaml &
          KN_PID=$!
          
          # Wait for Kubernetes resources to be created
          sleep 15
          
          echo ""
          echo "=== Checking Knative Revision status ==="
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl get revisions -n default
          
          echo ""
          echo "=== Checking pods ==="
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl get pods -n default -o wide
          
          echo ""
          echo "=== Checking pod events ==="
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl get events -n default --sort-by='.lastTimestamp' | tail -30
          
          echo ""
          echo "=== Checking for image pull issues ==="
          PROBLEM_PODS=$(sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl get pods -n default --field-selector=status.phase=Pending -o name 2>/dev/null || true)
          if [ -n "$PROBLEM_PODS" ]; then
            echo "Found pending pods: $PROBLEM_PODS"
            for pod in $PROBLEM_PODS; do
              echo ""
              echo "=== Describing $pod ==="
              sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl describe $pod -n default | tail -40
            done
          fi
          
          echo ""
          echo "=== Getting ALL helloworld pods (any status) ==="
          HELLOWORLD_PODS=$(sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl get pods -n default -l serving.knative.dev/service=helloworld -o name 2>/dev/null || true)
          if [ -n "$HELLOWORLD_PODS" ]; then
            echo "Found helloworld pods:"
            echo "$HELLOWORLD_PODS"
            for pod in $HELLOWORLD_PODS; do
              POD_NAME=$(echo $pod | cut -d'/' -f2)
              echo ""
              echo "=========================================="
              echo "=== Full details for $POD_NAME ==="
              echo "=========================================="
              
              echo ""
              echo "--- Pod Status ---"
              sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl get pod $POD_NAME -n default -o wide
              
              echo ""
              echo "--- Pod YAML (status section) ---"
              sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl get pod $POD_NAME -n default -o yaml | grep -A 30 "^status:"
              
              echo ""
              echo "--- Pod Events ---"
              sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl describe pod $POD_NAME -n default | grep -A 50 "^Events:"
              
              echo ""
              echo "--- Pod Logs (if container started) ---"
              sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl logs $POD_NAME -n default --all-containers=true 2>&1 || echo "Container not started yet or logs unavailable"
            done
          else
            echo "⚠ No helloworld pods found!"
            echo "Checking all pods in default namespace:"
            sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl get pods -n default -o wide
          fi
          
          echo ""
          echo "=== Checking gvisor-containerd logs ==="
          sudo journalctl -u gvisor-containerd --no-pager -n 50 || echo "No gvisor-containerd logs available"
          
          echo ""
          echo "=== Checking containerd logs for runsc errors ==="
          sudo journalctl -u containerd --no-pager -n 30 | grep -i "runsc\|gvisor\|error" || echo "No relevant containerd errors"
          
          echo ""
          echo "=========================================="
          echo "=== ROOT CAUSE ANALYSIS ==="
          echo "=========================================="
          
          echo ""
          echo "--- Kubelet logs (last 100 lines) ---"
          sudo journalctl -u kubelet --no-pager -n 100 | grep -A 5 -B 5 "helloworld\|CreateContainerError\|connection refused\|dial unix" || echo "No kubelet errors found"
          
          echo ""
          echo "--- vHive orchestrator logs (last 100 lines of orch.out) ---"
          if [ -f /tmp/ctrd-logs/${{ github.run_id }}/orch.out ]; then
            tail -100 /tmp/ctrd-logs/${{ github.run_id }}/orch.out | grep -A 3 -B 3 "error\|Error\|failed\|Failed\|CreateContainer\|RunPodSandbox" || echo "No errors in orch.out"
          fi
          
          echo ""
          echo "--- vHive orchestrator error log (full orch.err) ---"
          if [ -f /tmp/ctrd-logs/${{ github.run_id }}/orch.err ]; then
            cat /tmp/ctrd-logs/${{ github.run_id }}/orch.err
          fi
          
          echo ""
          echo "--- gvisor-containerd detailed logs (last 200 lines) ---"
          if [ -f /tmp/ctrd-logs/${{ github.run_id }}/gvisor.err ]; then
            tail -200 /tmp/ctrd-logs/${{ github.run_id }}/gvisor.err | grep -A 5 -B 5 "error\|Error\|failed\|Failed\|shim\|runsc" || echo "No errors in gvisor.err"
          fi
          
          echo ""
          echo "--- Checking containerd shim processes ---"
          ps aux | grep "containerd-shim" | grep -v grep || echo "No containerd shim processes running"
          
          echo ""
          echo "--- Checking for runsc processes ---"
          ps aux | grep "runsc" | grep -v grep || echo "No runsc processes running"
          
          echo ""
          echo "--- Checking containerd-shim-runsc-v1 binary ---"
          if [ -f /usr/local/bin/containerd-shim-runsc-v1 ]; then
            echo "✓ containerd-shim-runsc-v1 exists"
            ls -la /usr/local/bin/containerd-shim-runsc-v1
            file /usr/local/bin/containerd-shim-runsc-v1
            echo "Testing shim execution (correct flag is -v)..."
            /usr/local/bin/containerd-shim-runsc-v1 -v 2>&1 || echo "Shim version command failed"
          else
            echo "✗ containerd-shim-runsc-v1 NOT FOUND"
          fi
          
          echo ""
          echo "--- Testing runsc binary directly ---"
          if [ -f /usr/local/bin/runsc ]; then
            echo "✓ runsc exists"
            ls -la /usr/local/bin/runsc
            echo "Testing runsc execution..."
            /usr/local/bin/runsc --version || echo "runsc execution failed"
            echo "Testing runsc do command (with networking)..."
            /usr/local/bin/runsc do echo "test" 2>&1 || echo "runsc do with networking failed"
            echo "Testing runsc with ptrace platform (no networking)..."
            /usr/local/bin/runsc --platform=ptrace do echo "ptrace test" 2>&1 || echo "runsc do with ptrace failed"
          else
            echo "✗ runsc NOT FOUND"
          fi
          
          echo ""
          echo "--- Checking capabilities and permissions ---"
          echo "Checking runsc capabilities:"
          sudo getcap /usr/local/bin/runsc || echo "No capabilities set on runsc"
          echo "Checking shim capabilities:"
          sudo getcap /usr/local/bin/containerd-shim-runsc-v1 || echo "No capabilities set on shim"
          
          echo ""
          echo "--- Checking security restrictions ---"
          echo "User namespace support:"
          sysctl kernel.unprivileged_userns_clone 2>&1 || echo "kernel.unprivileged_userns_clone not available"
          
          echo "AppArmor status:"
          if command -v aa-status &> /dev/null; then
            sudo aa-status 2>&1 | grep -E "(apparmor module|profiles are loaded)" || echo "AppArmor info not available"
          else
            echo "aa-status command not found"
          fi
          
          echo "Checking for AppArmor denials in dmesg:"
          sudo dmesg | grep -i apparmor | tail -20 || echo "No recent AppArmor messages"
          
          echo "Checking for seccomp denials in dmesg:"
          sudo dmesg | grep -i seccomp | tail -20 || echo "No recent seccomp messages"
          
          echo ""
          echo "--- Testing network capability with sudo ---"
          echo "Testing if runsc works with sudo (to verify it's a permission issue):"
          sudo /usr/local/bin/runsc do echo "sudo test" 2>&1 || echo "Even sudo runsc failed"
          
          echo ""
          echo "--- Testing direct connection to vhive-cri.sock ---"
          sudo ls -la /etc/vhive-cri/vhive-cri.sock
          sudo timeout 5 crictl --runtime-endpoint unix:///etc/vhive-cri/vhive-cri.sock version || echo "Failed to connect to vhive-cri.sock"
          
          echo ""
          echo "--- Testing direct connection to gvisor-containerd.sock ---"
          sudo ls -la /run/gvisor-containerd/gvisor-containerd.sock
          sudo timeout 5 ctr -a /run/gvisor-containerd/gvisor-containerd.sock version || echo "Failed to connect to gvisor-containerd.sock"
          
          echo ""
          echo "--- Checking for UC-ip error in vHive code ---"
          echo "The 'no UC-ip for this pod present' error suggests vHive coordinator issue"
          echo "Searching for recent vHive CRI operations..."
          if [ -f /tmp/ctrd-logs/${{ github.run_id }}/orch.out ]; then
            tail -50 /tmp/ctrd-logs/${{ github.run_id }}/orch.out | grep -i "helloworld\|RunPodSandbox\|CreateContainer\|StartContainer"
          fi
          
          echo ""
          echo "=== Checking if kn service apply is still running ==="
          if kill -0 $KN_PID 2>/dev/null; then
            echo "kn service apply is still running (PID $KN_PID), killing it to see error state..."
            kill $KN_PID 2>/dev/null || true
            sleep 2
          else
            echo "kn service apply already completed"
          fi
          
          echo ""
          echo "=== Final service status ==="
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kn service list
          
          echo ""
          echo "=== Applying remaining services ==="
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kn service apply helloworldserial -f configs/knative_workloads/${{ inputs.sandbox }}/helloworldSerial.yaml
          sudo KUBECONFIG=/etc/kubernetes/admin.conf kn service apply pyaes -f configs/knative_workloads/${{ inputs.sandbox }}/pyaes.yaml
          sleep 30s
      
      - name: Run vHive CRI tests
        run: source /etc/profile && go clean -testcache && go test ./cri -v -race -cover

      - name: Run sandbox specific tests
        if: ${{ inputs.sandbox == 'firecracker' }}
        run: source /etc/profile && go clean -testcache && go test ./cri/${{ inputs.sandbox }} -v -race -cover

      - name: Archive log artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: ctrd-logs
          path: |
            /tmp/ctrd-logs/
            ${{ github.workspace }}/*.log
            ${{ github.workspace }}/scripts/github_runner/*.log